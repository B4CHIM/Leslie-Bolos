<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Leslie Bolos</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body style="padding: 20px;">
    <h1>⚙️ Gerenciar Produtos</h1>
    
    <section class="admin-form" style="max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px;">
        <h3>Adicionar Novo Produto</h3>
        <input type="text" id="nomeProd" placeholder="Nome do Bolo" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="number" id="precoProd" placeholder="Preço (ex: 25)" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="imgProd" placeholder="Caminho da Imagem (imagens/nome.png)" style="width:100%; margin-bottom:10px; padding:8px;">
        <button onclick="salvarProduto()" style="background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; width: 100%;">Salvar Produto</button>
    </section>

    <div id="listaAdmin" style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
        </div>

    <script src="script.js"></script>
    <script>
        function carregarListaAdmin() {
            const lista = document.getElementById("listaAdmin");
            lista.innerHTML = produtos.map((p, index) => `
                <div style="background: white; padding: 10px; width: 90%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px;">
                    <span><strong>${p.nome}</strong> - R$ ${p.preco}</span>
                    <button onclick="excluirProduto(${index})" style="background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Excluir</button>
                </div>
            `).join('');
        }

        function salvarProduto() {
            const nome = document.getElementById("nomeProd").value;
            const preco = parseFloat(document.getElementById("precoProd").value);
            const imagem = document.getElementById("imgProd").value;

            if(nome && preco) {
                produtos.push({ nome, preco, imagem });
                localStorage.setItem('meusProdutos', JSON.stringify(produtos));
                location.reload();
            }
        }

        function excluirProduto(index) {
            if(confirm("Deseja excluir este produto?")) {
                produtos.splice(index, 1);
                localStorage.setItem('meusProdutos', JSON.stringify(produtos));
                carregarListaAdmin();
            }
        }

        window.onload = carregarListaAdmin;
    </script>
</body>
</html>
